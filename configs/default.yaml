# 异构模型评估配置
# 与原论文不同：使用本质不同的模型（而非同一模型不同seed）

# ============================================================
# 模型列表 (异构 ensemble)
# 这些模型在架构、预训练方法、训练数据上都不同
# ============================================================
models:
  - clip_vit_b16      # 图像-文本对比学习
  - dinov2_vit_b14    # 自蒸馏
  - mae_vit_b16       # 掩码自编码器

# ============================================================
# 数据集
# ============================================================
dataset: cifar10

# ============================================================
# NC 参数 (按论文设置)
# ============================================================
n_ref: 5000          # 参考点数量
k_list:              # k-NN 的 k 值
  - 1
  - 100              # 论文主实验使用 k=100

distance: cosine     # 距离度量
seed: 42

# ============================================================
# 路径
# ============================================================
features_dir: ./features
output_dir: ./results
